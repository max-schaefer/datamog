name: Postgres Backend

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postgres-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.11
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/datamog_test

jobs:
  postgres:
    name: Postgres Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: datamog_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d datamog_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - run: bun test packages/backend/postgres/test/postgres.test.ts
