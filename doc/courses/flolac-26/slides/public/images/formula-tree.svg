<svg xmlns="http://www.w3.org/2000/svg" viewBox="38 44 494 482" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif">
  <!-- edges (drawn first; the node boxes cover their inner ends) -->
  <g stroke="#2f8576" stroke-width="3" fill="none">
    <line x1="360" y1="70" x2="250" y2="170"/>
    <line x1="360" y1="70" x2="470" y2="170"/>
    <line x1="250" y1="170" x2="160" y2="270"/>
    <line x1="250" y1="170" x2="340" y2="270"/>
    <line x1="160" y1="270" x2="160" y2="370"/>
    <line x1="160" y1="370" x2="100" y2="470"/>
    <line x1="160" y1="370" x2="220" y2="470"/>
  </g>
  <!-- nodes -->
  <g fill="#fff" stroke="#2f8576" stroke-width="3.5">
    <rect x="308" y="50"  width="104" height="40" rx="9"/>
    <rect x="198" y="150" width="104" height="40" rx="9"/>
    <rect x="418" y="150" width="104" height="40" rx="9"/>
    <rect x="108" y="250" width="104" height="40" rx="9"/>
    <rect x="288" y="250" width="104" height="40" rx="9"/>
    <rect x="108" y="350" width="104" height="40" rx="9"/>
    <rect x="48"  y="450" width="104" height="40" rx="9"/>
    <rect x="168" y="450" width="104" height="40" rx="9"/>
  </g>
  <!-- node labels: the (id, kind) pair from node(id, kind) -->
  <g fill="#16433c" font-size="22" text-anchor="middle">
    <text x="360" y="77">(8, or)</text>
    <text x="250" y="177">(6, and)</text>
    <text x="470" y="177">(7, var)</text>
    <text x="160" y="277">(4, not)</text>
    <text x="340" y="277">(5, var)</text>
    <text x="160" y="377">(3, or)</text>
    <text x="100" y="477">(1, var)</text>
    <text x="220" y="477">(2, var)</text>
  </g>
  <!-- variable each leaf reads -->
  <g fill="#2f8576" font-size="18" font-style="italic" text-anchor="middle">
    <text x="470" y="212">p</text>
    <text x="340" y="312">r</text>
    <text x="100" y="512">p</text>
    <text x="220" y="512">q</text>
  </g>
</svg>
